<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - 169Wins</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0c15; font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; }
        .admin-card { max-width: 600px; margin: 0 auto; background: #0f1222; border-radius: 30px; padding: 20px; border: 1px solid #2a2e45; }
        h2 { color: #facc15; text-align: center; margin-bottom: 20px; }
        h3 { color: #a0a8c0; margin: 15px 0 10px; font-size: 1rem; }
        select, input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 40px; border: none; font-size: 1rem; }
        select, input { background: #1a1f35; color: white; }
        button { background: #facc15; color: #0a0c16; font-weight: bold; cursor: pointer; }
        .user-list { background: #1a1f35; border-radius: 20px; padding: 10px; margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .user-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #2a2e45; color: white; }
        .user-item span:first-child { color: #facc15; }
        .info { text-align: center; margin-top: 12px; color: #10b981; font-size: 0.8rem; }
        .danger { background: #ef4444; color: white; }
        .stats { background: #1a1f35; border-radius: 20px; padding: 10px; margin-bottom: 15px; text-align: center; color: white; }
        .admin-key-input { background: #2a2e45; color: #facc15; text-align: center; font-weight: bold; letter-spacing: 2px; }
        .login-area { display: block; }
        .panel-area { display: none; }
    </style>
</head>
<body>
<div class="admin-card">
    <h2>🛠️ Admin Panel - 169Wins</h2>
    
    <div id="loginArea">
        <h3>🔐 چوونەژوورەوەی ئەدمین</h3>
        <input type="password" id="adminKeyInput" class="admin-key-input" placeholder="Admin Key">
        <button id="loginBtn">داخڵبوون</button>
        <div id="loginError" class="info" style="color:#ef4444;"></div>
    </div>
    
    <div id="panelArea">
        <div class="stats" id="stats">📊 بارکردنی داتا...</div>
        
        <h3>👥 هەڵبژاردنی بەکارهێنەر</h3>
        <select id="userSelect"></select>
        
        <h3>💰 بڕی پارە بە دینار</h3>
        <input type="number" id="amountValue" placeholder="بڕی پارە" value="1000">
        
        <button id="addBtn">➕ زیادکردن</button>
        <button id="removeBtn" class="danger">➖ کەمکردنەوە</button>
        
        <h3>📋 هەموو بەکارهێنەران</h3>
        <div id="userList" class="user-list"></div>
        <div id="info" class="info">✅ ئامادەیە</div>
    </div>
</div>

<script>
    const API_URL = '';
    let currentAdmin = false;

    document.getElementById("loginBtn").onclick = async () => {
        const key = document.getElementById("adminKeyInput").value;
        if (key !== "169WINS_ADMIN_SECRET_2024") {
            document.getElementById("loginError").innerHTML = "❌ Admin Key هەڵەیە!";
            return;
        }
        currentAdmin = true;
        document.getElementById("loginArea").style.display = "none";
        document.getElementById("panelArea").style.display = "block";
        loadUsers();
        setInterval(loadUsers, 3000);
    };

    async function loadUsers() {
        try {
            const res = await fetch(`${API_URL}/api/users`, {
                headers: { "adminkey": "169WINS_ADMIN_SECRET_2024" }
            });
            const users = await res.json();
            if (users.error) return;
            
            const totalBalance = users.reduce((sum, u) => sum + (u.balance || 0), 0);
            document.getElementById("stats").innerHTML = `👥 ژمارەی بەکارهێنەران: ${users.length} | 💰 کۆی گشتی باڵانس: ${totalBalance.toLocaleString()} د.ع`;
            
            const listDiv = document.getElementById("userList");
            const select = document.getElementById("userSelect");
            listDiv.innerHTML = "";
            select.innerHTML = '<option value="">-- هەڵبژێرە --</option>';
            
            users.forEach(user => {
                const div = document.createElement("div");
                div.className = "user-item";
                div.innerHTML = `<span>👤 ${user.username}</span><span>💰 ${(user.balance || 0).toLocaleString()} د.ع</span>`;
                listDiv.appendChild(div);
                
                const option = document.createElement("option");
                option.value = user.username;
                option.textContent = `${user.username} (${(user.balance || 0).toLocaleString()} د.ع)`;
                select.appendChild(option);
            });
            
            updateCurrentBalanceDisplay();
        } catch(e) {
            console.log(e);
        }
    }

    function updateCurrentBalanceDisplay() {
        const select = document.getElementById("userSelect");
        const username = select.value;
        if (!username) return;
        const infoDiv = document.getElementById("info");
        if (infoDiv) {
            infoDiv.innerHTML = `💰 باڵانسی ${username}: <strong style="color:#facc15;">...</strong> د.ع`;
        }
    }

    async function updateBalance(action) {
        const select = document.getElementById("userSelect");
        const username = select.value;
        const amount = parseFloat(document.getElementById("amountValue").value);
        
        if (!username || !amount || amount <= 0) {
            document.getElementById("info").innerHTML = "❌ تکایە بەکارهێنەر و بڕی دروست هەڵبژێرە";
            document.getElementById("info").style.color = "#ef4444";
            setTimeout(() => {
                document.getElementById("info").innerHTML = "✅ ئامادەیە";
                document.getElementById("info").style.color = "#10b981";
            }, 2000);
            return;
        }
        
        try {
            const res = await fetch(`${API_URL}/api/admin/update-balance`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    adminKey: "169WINS_ADMIN_SECRET_2024",
                    username: username,
                    amount: amount,
                    action: action
                })
            });
            const data = await res.json();
            if (data.success) {
                const msg = action === "add" ? `➕ ${amount.toLocaleString()} د.ع زیاد کرا بۆ ${username}` : `➖ ${amount.toLocaleString()} د.ع کەم کرا لە ${username}`;
                document.getElementById("info").innerHTML = `✅ ${msg}`;
                document.getElementById("info").style.color = "#10b981";
                loadUsers();
            } else {
                document.getElementById("info").innerHTML = `❌ هەڵە: ${data.error}`;
                document.getElementById("info").style.color = "#ef4444";
            }
        } catch(e) {
            document.getElementById("info").innerHTML = "❌ پەیوەندی بە سەرڤەرەوە شکستی هێنا";
            document.getElementById("info").style.color = "#ef4444";
        }
        
        setTimeout(() => {
            document.getElementById("info").innerHTML = "✅ ئامادەیە";
            document.getElementById("info").style.color = "#10b981";
        }, 2500);
    }

    document.getElementById("addBtn").onclick = () => updateBalance("add");
    document.getElementById("removeBtn").onclick = () => updateBalance("remove");
    document.getElementById("userSelect").onchange = () => updateCurrentBalanceDisplay();
</script>
</body>
</html>
